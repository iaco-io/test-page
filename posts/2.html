<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="content" style="max-width: 800px; margin: 0 auto; padding: 20px; font-family: sans-serif;"></div>
  <script id="markdown-data" type="text/markdown">
---
title: Page 2
---

# Hello 2!

Hi 2
</script>
  <script>
    const mdText = document.getElementById('markdown-data').textContent;
    // Strip frontmatter for rendering
    const cleanMd = mdText.replace(/^---\n[\s\S]*?\n---\n/, '').trim();
    document.getElementById('content').innerHTML = marked.parse(cleanMd);
  </script>
</body>
</html>
